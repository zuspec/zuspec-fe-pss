
package:
  name: zuspec-fe-pss
  version: 0.0.1

  dep-sets:
  - name: default-dev
    deps: 
    - name: zuspec-dataclasses
      url: https://github.com/zuspec/zuspec-dataclasses.git
    - name: pssparser
      url: https://github.com/PSSTools/pssparser.git
    - name: pytest
      src: pypi
    - name: Sphinx
      src: pypi
    - name: sphinx-rtd-theme
      src: pypi
    - name: cairosvg
      src: pypi
    - name: breathe
      src: pypi
    - name: funcparserlib
      src: pypi
      version: 1.0.0a0
    - name: mistune
      src: pypi
      version: <2.0.0
    - name: sphinxcontrib-makedomain
      src: pypi
    - name: sphinxcontrib-openapi
      src: pypi
    - name: sphinxcontrib-spelling
      src: pypi
    - name: sphinxcontrib-seqdiag
      src: pypi
      version: <3.0.0
    - name: sphinx-issues
      src: pypi
    - name: sphinx-argparse
      src: pypi
    - name: pyenchant
      src: pypi
    - name: jinja2
      src: pypi

  - name: default
    deps:
    - name: zuspec-dataclasses
      url: https://github.com/zuspec/zuspec-dataclasses.git
    - name: pssparser
      url: https://github.com/PSSTools/pssparser.git
